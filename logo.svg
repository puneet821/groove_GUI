<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Warm Sunset Primary Gradient (Coral Red -> Hot Orange -> Sun Gold) -->
    <linearGradient id="warmSunset" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3a5c"/>
      <stop offset="50%" stop-color="#ff7e5f"/>
      <stop offset="100%" stop-color="#ffd000"/>
    </linearGradient>

    <!-- Warm Highlight Gradient -->
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd000"/>
      <stop offset="100%" stop-color="#ff3a5c"/>
    </linearGradient>

    <!-- Clean Peach-Cream Ivory Cassette Shell Gradient -->
    <linearGradient id="cleanIvory" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe6cc"/>
    </linearGradient>

    <!-- Soft Warm Label Gradient -->
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8f2"/>
      <stop offset="100%" stop-color="#ffebd6"/>
    </linearGradient>

    <!-- Warm Bronze/Gold Screw Gradient -->
    <linearGradient id="bronzeScrew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd000"/>
      <stop offset="50%" stop-color="#b37400"/>
      <stop offset="100%" stop-color="#593a00"/>
    </linearGradient>

    <!-- Warm Soft Shadow for 3D depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#ff3a5c" flood-opacity="0.15"/>
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <!-- Warm Ambient Neon Glow -->
    <filter id="warmGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── MAIN CASSETTE SHELL ── -->
  <!-- Rounded compact cassette shell filled with bright clean warm ivory-peach and bordered with glowing warm sunset -->
  <path d="M 80 110
           L 432 110
           A 24 24 0 0 1 456 134
           L 456 316
           A 12 12 0 0 1 444 328
           L 366 328
           A 8 8 0 0 0 360 332
           L 344 362
           A 14 14 0 0 1 332 370
           L 180 370
           A 14 14 0 0 1 168 362
           L 152 332
           A 8 8 0 0 0 146 328
           L 68 328
           A 12 12 0 0 1 56 316
           L 56 134
           A 24 24 0 0 1 80 110 Z"
        fill="url(#cleanIvory)" 
        stroke="url(#warmSunset)" 
        stroke-width="7.5" 
        filter="url(#softShadow)"/>

  <!-- High-contrast Inner Highlight Ring -->
  <path d="M 82 114
           L 430 114
           A 20 20 0 0 1 450 134
           L 450 314
           A 8 8 0 0 1 442 322
           L 368 322
           A 12 12 0 0 0 358 328
           L 342 358
           A 8 8 0 0 1 335 364
           L 177 364
           A 8 8 0 0 1 170 358
           L 154 328
           A 12 12 0 0 0 144 322
           L 70 322
           A 8 8 0 0 1 62 314
           L 62 134
           A 20 20 0 0 1 82 114 Z"
        fill="none" 
        stroke="#ffffff" 
        stroke-width="2" 
        opacity="0.8"/>

  <!-- Left & Right Tactile Ribbed Grip Indents in rich coral -->
  <g opacity="0.6" stroke="#ff3a5c" stroke-width="3" stroke-linecap="round">
    <line x1="72" y1="160" x2="72" y2="180"/>
    <line x1="72" y1="195" x2="72" y2="215"/>
    <line x1="72" y1="230" x2="72" y2="250"/>
    
    <line x1="440" y1="160" x2="440" y2="180"/>
    <line x1="440" y1="195" x2="440" y2="215"/>
    <line x1="440" y1="230" x2="440" y2="250"/>
  </g>

  <!-- ── CASSETTE LABEL ── -->
  <!-- Beautiful warm peach-rose sticker -->
  <rect x="94" y="136" width="324" height="152" rx="14" fill="#ffebd6" stroke="#ff7e5f" stroke-width="2"/>
  <rect x="98" y="140" width="316" height="144" rx="10" fill="url(#labelGrad)"/>

  <!-- Clean decorative border stripes -->
  <path d="M 98 152 L 414 152" stroke="url(#accentGlow)" stroke-width="1.5"/>
  <path d="M 98 244 L 414 244" stroke="#ff7e5f" stroke-width="1.5" opacity="0.5"/>

  <!-- High-contrast Bold technical typography (in dark amber/chocolate for maximum visibility) -->
  <text x="142" y="172" fill="#2c1608" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="900" letter-spacing="4">GROOVE.CMD</text>
  <!-- Warm Glowing Prompt symbol -->
  <text x="110" y="172" fill="#ff3a5c" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="900" filter="url(#warmGlow)">&gt;_</text>

  <!-- C-90 Technical Box Badge -->
  <rect x="348" y="152" width="52" height="22" rx="4" fill="none" stroke="#ff7e5f" stroke-width="2"/>
  <text x="374" y="167" fill="#ff3a5c" font-family="JetBrains Mono, Consolas, monospace" font-size="10" font-weight="900" text-anchor="middle" letter-spacing="0.5">C-90</text>

  <!-- Clean Audio Wave Spectrum under the window -->
  <path d="M 112 268 Q 125 255 138 268 T 164 268 T 190 268 T 216 268 T 242 268 T 268 268 T 294 268 T 320 268 T 346 268 T 372 268 T 398 268" 
        fill="none" stroke="url(#warmSunset)" stroke-width="3" stroke-linecap="round"/>

  <!-- ── HIGH CONTRAST VIEWPORT WINDOW ── -->
  <!-- Pure white backplate for maximum mechanical visibility -->
  <rect x="156" y="186" width="200" height="60" rx="8" fill="#ffffff" stroke="#ff7e5f" stroke-width="2"/>

  <!-- Winding Sunset Coils (Translucent orange/gold) -->
  <!-- Left Spool Tape (Large winding) -->
  <circle cx="210" cy="216" r="28" fill="#ffe0cc" opacity="0.8"/>
  <circle cx="210" cy="216" r="24" fill="none" stroke="#ff7e5f" stroke-width="1.5" opacity="0.5"/>
  <circle cx="210" cy="216" r="18" fill="none" stroke="#ff3a5c" stroke-width="1" opacity="0.3"/>

  <!-- Right Spool Tape (Small winding) -->
  <circle cx="302" cy="216" r="19" fill="#ffe0cc" opacity="0.7"/>
  <circle cx="302" cy="216" r="16" fill="none" stroke="#ff7e5f" stroke-width="1.5" opacity="0.4"/>

  <!-- Running Tape Path -->
  <line x1="182" y1="238" x2="330" y2="238" stroke="#ff7e5f" stroke-width="2.5" opacity="0.75"/>

  <!-- Left Sprocket (Electric Sun Gold Hub) -->
  <circle cx="210" cy="216" r="11" fill="#fff7e6" stroke="#ff7e5f" stroke-width="2"/>
  <!-- Teeth / Spokes (Very clean contrast teeth) -->
  <circle cx="210" cy="216" r="8.5" fill="none" stroke="#ffd000" stroke-width="4.5" stroke-dasharray="3, 3.5"/>
  <circle cx="210" cy="216" r="3.5" fill="#2c1608"/>

  <!-- Right Sprocket (Electric Sun Gold Hub) -->
  <circle cx="302" cy="216" r="11" fill="#fff7e6" stroke="#ff7e5f" stroke-width="2"/>
  <!-- Teeth / Spokes -->
  <circle cx="302" cy="216" r="8.5" fill="none" stroke="#ffd000" stroke-width="4.5" stroke-dasharray="3, 3.5"/>
  <circle cx="302" cy="216" r="3.5" fill="#2c1608"/>

  <!-- Viewport ticks -->
  <g stroke="#ff7e5f" stroke-width="1.5" opacity="0.6">
    <line x1="256" y1="186" x2="256" y2="192"/>
    <line x1="256" y1="240" x2="256" y2="246"/>
    <line x1="246" y1="216" x2="242" y2="216"/>
    <line x1="266" y1="216" x2="270" y2="216"/>
  </g>

  <!-- ── BOTTOM PLAYHEAD ACCENTS ── -->
  <!-- Capstan & Pin Holes in dark outline -->
  <circle cx="186" cy="348" r="8" fill="#ffe0cc" stroke="#ff7e5f" stroke-width="2"/>
  <circle cx="186" cy="348" r="3" fill="#2c1608"/>
  
  <circle cx="326" cy="348" r="8" fill="#ffe0cc" stroke="#ff7e5f" stroke-width="2"/>
  <circle cx="326" cy="348" r="3" fill="#2c1608"/>
  
  <circle cx="256" cy="348" r="6.5" fill="#fff7e6" stroke="#ff3a5c" stroke-width="2"/>

  <!-- Guide Pins -->
  <circle cx="120" cy="348" r="3" fill="#ff7e5f"/>
  <circle cx="392" cy="348" r="3" fill="#ff7e5f"/>

  <!-- Trapezoid indent paths -->
  <path d="M 166 336 L 346 336" stroke="#ffebd6" stroke-width="3"/>
  <path d="M 174 358 L 338 358" stroke="#ffebd6" stroke-width="3"/>

  <!-- ── CORNER WARM GOLD SCREWS ── -->
  <!-- Top Left Screw -->
  <circle cx="72" cy="126" r="6" fill="url(#bronzeScrew)" stroke="#2c1608" stroke-width="1"/>
  <line x1="68" y1="122" x2="76" y2="130" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>
  
  <!-- Top Right Screw -->
  <circle cx="440" cy="126" r="6" fill="url(#bronzeScrew)" stroke="#2c1608" stroke-width="1"/>
  <line x1="436" y1="130" x2="444" y2="122" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>

  <!-- Bottom Left Screw -->
  <circle cx="82" cy="312" r="6" fill="url(#bronzeScrew)" stroke="#2c1608" stroke-width="1"/>
  <line x1="78" y1="316" x2="86" y2="308" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>

  <!-- Bottom Right Screw -->
  <circle cx="430" cy="312" r="6" fill="url(#bronzeScrew)" stroke="#2c1608" stroke-width="1"/>
  <line x1="426" y1="308" x2="434" y2="316" stroke="#ffffff" stroke-width="1.2" opacity="0.8"/>
</svg>
